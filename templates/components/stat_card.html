<div class="card border-0 shadow-sm">
    <div class="card-body">
        <div class="flex items-start justify-between gap-3">
            <div>
                <p class="text-sm text-slate-500 dark:text-slate-400">{{ label }}</p>
                <p class="mt-1 text-3xl font-semibold text-slate-950 dark:text-white">{{ value }}</p>
                {% if help_text %}
                    <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">{{ help_text }}</p>
                {% endif %}
            </div>
            {% if icon %}
                <div class="rounded-md bg-sky-100 p-2 text-sky-700 dark:bg-sky-950 dark:text-sky-200">
                    {% include "components/icon.html" with name=icon class="h-5 w-5" %}
                </div>
            {% endif %}
        </div>
    </div>
</div>
