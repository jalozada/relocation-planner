<a
    href="{{ href }}"
    class="group flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium no-underline transition hover:no-underline {% if active %}bg-sky-100 text-sky-800 dark:bg-sky-950 dark:text-sky-200{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-950 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-white{% endif %}"
>
    {% if icon %}
        {% include "components/icon.html" with name=icon class="h-4 w-4" %}
    {% endif %}
    <span>{{ label }}</span>
</a>
