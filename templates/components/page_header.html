<div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
    <div>
        <h1 class="text-2xl font-semibold tracking-tight text-slate-950 dark:text-white">{{ title }}</h1>
        {% if subtitle %}
            <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">{{ subtitle }}</p>
        {% endif %}
    </div>
    {% if action_href and action_label %}
        {% include "components/button.html" with href=action_href label=action_label icon=action_icon %}
    {% endif %}
</div>
